info:
  name: Top 10 Payment Tracking detail
  type: http
  seq: 2

http:
  method: POST
  url: "{{currentIP}}/api/Dashboard3/GetTrackingPaymentByAirline_detail"
  body:
    type: json
    data: |-
      {
        "page_number": 1,
        "page_size": 10,
        "year": "2026",
        "airlineCode": "THA"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
