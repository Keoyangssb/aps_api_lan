info:
  name: EditAirPort
  type: http
  seq: 2

http:
  method: POST
  url: "{{currentIP}}/api/MasterData/EditAirPort"
  body:
    type: json
    data: |-
      {
        "airport_id": "9",
        "airport_name": "Pakse International Airport",
        "icao_code": "PKZ",
        "iata_code": "PKZ",
        "airport_type_id": "2",
        "airport_24h_operation": "false",
        "open_time": "00:00",
        "close_time": "23:59",
        "night_landing_facility": "false"
      }
  auth:
    type: bearer
    token: "{{authToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
