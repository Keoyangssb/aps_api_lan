info:
  name: EditAircraft
  type: http
  seq: 1

http:
  method: POST
  url: "{{currentIP}}/api/MasterData/EditAircraft"
  body:
    type: json
    data: |-
      {
        "aircraft_id": "4",
        "icao_code": "A004",
        "mtow": "400",
        "weight": "600"
      }
  auth:
    type: bearer
    token: "{{authToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
